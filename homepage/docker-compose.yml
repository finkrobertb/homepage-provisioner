services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      # Prevents DNS-rebinding warnings when accessed via IP address
      - HOMEPAGE_ALLOWED_HOSTS=*
    volumes:
      # Mount config directory so settings persist without rebuilding the container
      - /opt/homepage/config:/app/config

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /opt/homepage/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - homepage
